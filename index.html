<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lista de Periféricos</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; }
    .card { border: 1px solid #e6e6ea; border-radius: 14px; overflow: hidden; background: #fff; }
    .card img { width: 100%; height: 180px; object-fit: cover; display: block; }
    .card .p { padding: 12px; }
    .name { font-weight: 700; margin: 0 0 6px; }
    .desc { margin: 0; color: #444; font-size: 14px; }
    .tag { display:inline-block; margin-top:8px; font-size:12px; color:#555; background:#f4f4f6; padding:4px 8px; border-radius:999px;}
  </style>
</head>
<body>
  <h1>Lista de Periféricos (com fotos)</h1>

  <div class="grid">
    <div class="card">
      <img src="img/leitor_qrcode.webp" alt="Leitor QR Code">
      <div class="p">
        <p class="name">Leitor QR Code</p>
        <p class="desc">Modelo XYZ — USB — usado no totem.</p>
        <span class="tag">Categoria: Entrada</span>
      </div>
    </div>

    <div class="card">
      <img src="img/impressora_termica.webp" alt="Impressora Térmica">
      <div class="p">
        <p class="name">Impressora Térmica</p>
        <p class="desc">Bobina 80mm — Ethernet.</p>
        <span class="tag">Categoria: Saída</span>
      </div>
    </div>
  </div>
</body>
</html>

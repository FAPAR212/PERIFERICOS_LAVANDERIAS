<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Periféricos Lavanderias</title>
  <style>
    :root{
      --bg:#ffffff;
      --text:#111;
      --muted:#555;
      --border:#e6e6ea;
      --chip:#f4f4f6;
      --warnbg:#fff7e6;
      --warnbd:#ffe0a3;
    }

    body{
      font-family: Arial, sans-serif;
      margin: 20px;
      color: var(--text);
      background: var(--bg);
    }

    h1{ margin: 0 0 10px; }

    .top{
      display:flex;
      gap:12px;
      align-items:center;
      flex-wrap:wrap;
      margin: 10px 0 16px;
    }

    input{
      flex:1;
      min-width: 240px;
      padding:10px 12px;
      border:1px solid #ddd;
      border-radius:10px;
    }

    .pill{
      font-size:12px;
      color:#333;
      background:var(--chip);
      padding:6px 10px;
      border-radius:999px;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 14px;
    }

    .card{
      border:1px solid var(--border);
      border-radius:14px;
      overflow:hidden;
      background:#fff;
      box-shadow: 0 1px 0 rgba(0,0,0,.03);
    }

    .thumb{
      position:relative;
      width:100%;
      height:190px;
      background:#f6f6f8;
      cursor: zoom-in;
    }

    .thumb img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .badge{
      position:absolute;
      left:10px;
      top:10px;
      background: rgba(255,255,255,.9);
      border:1px solid var(--border);
      padding:4px 8px;
      border-radius:999px;
      font-size:12px;
      color:#333;
    }

    .p{ padding:12px; }

    .name{
      font-weight:700;
      margin:0 0 6px;
      text-transform: capitalize;
    }

    .meta{
      margin:0;
      color:var(--muted);
      font-size:13px;
      word-break: break-word;
    }

    .obs-box{
      margin-top:10px;
      padding:10px;
      border:1px solid #ececf1;
      border-radius:10px;
      background:#fafafa;
    }

    .obs-title{
      font-size:12px;
      font-weight:700;
      color:#444;
      margin-bottom:6px;
      text-transform: uppercase;
      letter-spacing: .03em;
    }

    .obs-text{
      margin:0;
      color:#333;
      font-size:13px;
      line-height:1.45;
      white-space:pre-wrap;
    }

    .actions{
      display:flex;
      gap:8px;
      margin-top:10px;
      flex-wrap:wrap;
    }

    button{
      border:1px solid var(--border);
      background:#fff;
      padding:7px 10px;
      border-radius:10px;
      cursor:pointer;
      font-size:12px;
    }

    button:hover{ background:#fafafa; }

    .warn{
      background:var(--warnbg);
      border:1px solid var(--warnbd);
      padding:10px 12px;
      border-radius:10px;
      margin: 12px 0;
      color:#444;
    }

    .modal{
      position:fixed;
      inset:0;
      background: rgba(0,0,0,.65);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:9999;
    }

    .modal.open{ display:flex; }

    .modal-card{
      background:#fff;
      border-radius:14px;
      max-width:980px;
      width:100%;
      overflow:hidden;
    }

    .modal-img{
      width:100%;
      max-height:75vh;
      object-fit:contain;
      display:block;
      background:#111;
    }

    .modal-bar{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      padding:12px;
      border-top:1px solid var(--border);
      flex-wrap:wrap;
    }

    .modal-title{
      font-weight:700;
      text-transform:capitalize;
      margin-bottom:4px;
    }

    .modal-obs{
      margin-top:8px;
      color:#333;
      font-size:13px;
      line-height:1.45;
      white-space:pre-wrap;
    }

    .toast{
      position:fixed;
      bottom:18px;
      left:50%;
      transform:translateX(-50%);
      background:#111;
      color:#fff;
      padding:10px 12px;
      border-radius:12px;
      font-size:13px;
      display:none;
      z-index:10000;
    }

    .toast.show{ display:block; }
  </style>
</head>
<body>
  <h1>Lista de Periféricos (com fotos)</h1>

  <div class="top">
    <input id="q" placeholder="Buscar por nome, arquivo ou observação..." />
    <span id="count" class="pill">0 itens</span>
    <span class="pill">Pasta: <b>imagem/</b></span>
  </div>

  <div id="msg"></div>
  <div id="grid" class="grid"></div>

  <div id="modal" class="modal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true">
      <img id="modalImg" class="modal-img" src="" alt="">
      <div class="modal-bar">
        <div>
          <div id="modalTitle" class="modal-title"></div>
          <div id="modalMeta" class="meta"></div>
          <div id="modalObs" class="modal-obs"></div>
        </div>
        <div class="actions">
          <button id="btnCopyName" type="button">Copiar nome</button>
          <button id="btnCopyFile" type="button">Copiar arquivo</button>
          <button id="btnOpenImg" type="button">Abrir imagem</button>
          <button id="btnClose" type="button">Fechar</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast">Copiado!</div>

<script>
  const grid  = document.getElementById("grid");
  const q     = document.getElementById("q");
  const count = document.getElementById("count");
  const msg   = document.getElementById("msg");

  const modal = document.getElementById("modal");
  const modalImg = document.getElementById("modalImg");
  const modalTitle = document.getElementById("modalTitle");
  const modalMeta = document.getElementById("modalMeta");
  const modalObs = document.getElementById("modalObs");
  const btnClose = document.getElementById("btnClose");
  const btnCopyName = document.getElementById("btnCopyName");
  const btnCopyFile = document.getElementById("btnCopyFile");
  const btnOpenImg = document.getElementById("btnOpenImg");
  const toast = document.getElementById("toast");

  let ITEMS = [];
  let OBS = {};
  let CURRENT = null;

  function prettyNameFromFilename(filename){
    const base = filename.replace(/\.[^.]+$/, "");
    return base.replace(/[_-]+/g, " ").trim();
  }

  function normalize(s){
    return (s || "")
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "");
  }

  function showToast(text="Copiado!"){
    toast.textContent = text;
    toast.classList.add("show");
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toast.classList.remove("show"), 1200);
  }

  async function copyText(text){
    try{
      await navigator.clipboard.writeText(text);
      showToast("Copiado!");
    } catch(e){
      const ta = document.createElement("textarea");
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      showToast("Copiado!");
    }
  }

  function getObs(filename){
    return OBS[filename] || "Sem observações.";
  }

  function openModal(item){
    CURRENT = item;
    modalImg.src = item.imagem;
    modalImg.alt = item.nome;
    modalTitle.textContent = item.nome;
    modalMeta.textContent = `Arquivo: ${item.arquivo}`;
    modalObs.textContent = getObs(item.arquivo);
    modal.classList.add("open");
    modal.setAttribute("aria-hidden", "false");
  }

  function closeModal(){
    modal.classList.remove("open");
    modal.setAttribute("aria-hidden", "true");
    CURRENT = null;
  }

  function render(list){
    grid.innerHTML = list.map(item => `
      <div class="card">
        <div class="thumb" data-img="${item.imagem}" data-name="${item.nome}" data-file="${item.arquivo}">
          <span class="badge">Clique para ampliar</span>
          <img loading="lazy" src="${item.imagem}" alt="${item.nome}">
        </div>
        <div class="p">
          <p class="name">${item.nome}</p>
          <p class="meta">Arquivo: ${item.arquivo}</p>

          <div class="obs-box">
            <div class="obs-title">Observações</div>
            <p class="obs-text">${getObs(item.arquivo)}</p>
          </div>

          <div class="actions">
            <button type="button" data-copy="${item.nome}">Copiar nome</button>
            <button type="button" data-copy="${item.arquivo}">Copiar arquivo</button>
          </div>
        </div>
      </div>
    `).join("");

    count.textContent = `${list.length} itens`;
  }

  function filter(){
    const term = normalize(q.value);
    const list = ITEMS.filter(i =>
      normalize(i.nome).includes(term) ||
      normalize(i.arquivo).includes(term) ||
      normalize(getObs(i.arquivo)).includes(term)
    );
    render(list);
  }

  async function loadObservacoes(){
    try{
      const res = await fetch("observacoes.json", { cache: "no-store" });
      if(!res.ok) return {};
      return await res.json();
    } catch(e){
      return {};
    }
  }

  async function loadItems(){
    try{
      const [res, obs] = await Promise.all([
        fetch("imagens.json", { cache: "no-store" }),
        loadObservacoes()
      ]);

      OBS = obs || {};

      if(!res.ok) throw new Error("imagens.json não encontrado");
      const files = await res.json();

      ITEMS = (files || [])
        .filter(f => typeof f === "string" && f.toLowerCase().endsWith(".webp"))
        .map(f => ({
          arquivo: f,
          nome: prettyNameFromFilename(f),
          imagem: `imagem/${f}`
        }))
        .sort((a,b) => a.nome.localeCompare(b.nome, "pt-BR"));

      msg.innerHTML = "";
      render(ITEMS);
    } catch(e){
      msg.innerHTML = `
        <div class="warn">
          <b>Não consegui carregar <code>imagens.json</code>.</b><br>
          Verifique se o GitHub Actions já gerou esse arquivo.
        </div>`;
      ITEMS = [];
      render(ITEMS);
    }
  }

  q.addEventListener("input", filter);

  grid.addEventListener("click", (ev) => {
    const btn = ev.target.closest("button[data-copy]");
    if(btn){
      copyText(btn.getAttribute("data-copy"));
      return;
    }

    const thumb = ev.target.closest(".thumb");
    if(thumb){
      const item = {
        imagem: thumb.dataset.img,
        nome: thumb.dataset.name,
        arquivo: thumb.dataset.file
      };
      openModal(item);
    }
  });

  btnClose.addEventListener("click", closeModal);
  modal.addEventListener("click", (e) => { if(e.target === modal) closeModal(); });
  document.addEventListener("keydown", (e) => { if(e.key === "Escape") closeModal(); });

  btnCopyName.addEventListener("click", () => CURRENT && copyText(CURRENT.nome));
  btnCopyFile.addEventListener("click", () => CURRENT && copyText(CURRENT.arquivo));
  btnOpenImg.addEventListener("click", () => { if(CURRENT) window.open(CURRENT.imagem, "_blank"); });

  loadItems();
</script>
</body>
</html>

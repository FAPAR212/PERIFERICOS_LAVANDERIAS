<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Periféricos Lavanderias</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h1 { margin: 0 0 8px; }
    .bar { display:flex; gap:10px; align-items:center; margin: 14px 0 18px; }
    input { flex:1; padding:10px 12px; border:1px solid #ddd; border-radius:10px; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }
    .card { border:1px solid #e6e6ea; border-radius:14px; overflow:hidden; background:#fff; }
    .card img { width:100%; height:170px; object-fit:cover; display:block; background:#f6f6f8; }
    .p { padding:12px; }
    .name { font-weight:700; margin:0 0 6px; text-transform: capitalize; }
    .meta { margin:0; color:#444; font-size:13px; }
    .tag { display:inline-block; margin-top:8px; font-size:12px; color:#555; background:#f4f4f6; padding:4px 8px; border-radius:999px;}
    .small { color:#666; font-size:12px; margin-top:6px; }
  </style>
</head>
<body>
  <h1>Lista de Periféricos (com fotos)</h1>

  <div class="bar">
    <input id="q" placeholder="Buscar (ex: bomba, conector, atuador)..." />
    <span id="count" class="small"></span>
  </div>

  <div id="grid" class="grid"></div>

<script>
  // ✅ TROQUE AQUI pelos seus arquivos reais (sem acentos/espaços, idealmente)
  const ITEMS = [
    { nome: "bomba diafragma", img: "img/bomba_diafragma.webp", categoria: "bombas" },
    { nome: "bomba dosadora", img: "img/bomba_dosadora.webp", categoria: "bombas" },
    { nome: "atuador pneumatico dupla acao", img: "img/atuador_pneumatico_dupla_acao.webp", categoria: "pneumatica" },
    { nome: "conector para atuador", img: "img/conector_para_atuador.webp", categoria: "conexoes" },
  ];

  const grid = document.getElementById("grid");
  const q = document.getElementById("q");
  const count = document.getElementById("count");

  function render(list){
    grid.innerHTML = list.map(item => `
      <div class="card">
        <img loading="lazy" src="${item.img}" alt="${item.nome}">
        <div class="p">
          <p class="name">${item.nome}</p>
          <p class="meta">Arquivo: ${item.img.split("/").pop()}</p>
          <span class="tag">Categoria: ${item.categoria || "—"}</span>
        </div>
      </div>
    `).join("");
    count.textContent = `${list.length} itens`;
  }

  function normalize(s){
    return (s || "")
      .toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "");
  }

  function filter(){
    const term = normalize(q.value);
    const list = ITEMS.filter(i => normalize(i.nome).includes(term) || normalize(i.categoria).includes(term));
    render(list);
  }

  q.addEventListener("input", filter);
  render(ITEMS);
</script>
</body>
</html>
